apis:
  toValidate:
    root: ../merged-woosmap-openapi3.json
extends:
  - recommended
plugins:
  - ./plugins.js
rules:
  tag-description: warn
  no-path-trailing-slash: off
  woosmap/validate-tags:
    severity: error
    requireOperationTags: true
    expectedNames:
      - "Stores API"
      - "Geolocation API"
      - "Localities API"
      - "Address API"
      - "Woosmap for what3words API"
      - "Indoor API"
      - "Transit API"
      - "Datasets API"
      - "Static Map API"
      - "Distance API"